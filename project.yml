name: XFeat3D
options:
  bundleIdPrefix: com.daiki
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug
  xcodeVersion: "15.0"

targets:
  XFeat3D:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
    resources:
      - Resources
      - path: Sources/XFeat/XFeat.mlpackage
        buildRule: coreml
      - path: Sources/ALIKED/ALIKED.mlpackage
        buildRule: coreml
      - path: Sources/SuperPoint/SuperPoint.mlpackage
        buildRule: coreml
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.daiki.XFeat3D
      TARGETED_DEVICE_FAMILY: "1,2"
      SWIFT_VERSION: "5.9"
      SWIFT_OBJC_BRIDGING_HEADER: Sources/OpenCV/XFeat3D-Bridging-Header.h
      CLANG_ENABLE_MODULES: YES
    dependencies:
      - sdk: Accelerate.framework
      - sdk: CoreMotion.framework
      - sdk: SceneKit.framework
      - framework: Sources/OpenCV/opencv2.xcframework
        embed: true
    info:
      path: Resources/Info.plist
      properties:
        NSCameraUsageDescription: "Camera is used for 3D reconstruction via feature tracking"
        NSPhotoLibraryUsageDescription: "Photos library access"
        UIDeviceFamily: [2]
        UILaunchStoryboardName: ""
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
